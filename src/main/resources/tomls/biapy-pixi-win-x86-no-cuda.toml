[workspace]
name = "%s"
channels = ["https://prefix.dev/conda-forge"]
platforms = ["win-64"]

[activation.env]
CUDA_HOME = ""
CUDA_PATH = ""
CUDA_ROOT = ""
LD_LIBRARY_PATH = ""
DYLD_LIBRARY_PATH = ""
PYTHONPATH = ""

[dependencies]
python = "==3.10"
pip = "*"

[feature.standard-packages.pypi-dependencies]
timm = "==1.0.14"
pytorch-msssim = "==1.0.0"
torchmetrics = "==1.4.3"
cellpose = "==3.1.1.1"
scipy = "==1.15.2"
torch-fidelity = "==0.3.0"
careamics = "*"
biapy = "==3.5.10"
ultralytics = "==8.4.40"
appose = "*"

[feature.win-x86-64-no-cuda]
platforms = ["win-64"]

[feature.win-x86-64-no-cuda.pypi-dependencies]
torch = { version = "==2.4.1", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = "==0.19.1", index = "https://download.pytorch.org/whl/cpu" }

[tasks.python]
cmd = "python"

[tasks.check-gpu]
cmd = '''
python -c "import platform, torch, torchvision; print('Torch:', torch.__version__); print('Torchvision:', torchvision.__version__); print('CUDA available:', torch.cuda.is_available()); print('CUDA runtime:', torch.version.cuda); print('Platform:', platform.platform())"
'''

[feature.win-x86-64-no-cuda.tasks.python]
cmd = '''
python -c "import os, re; os.environ['PATH'] = ';'.join(p for p in os.environ.get('PATH', '').split(';') if not re.search(r'CUDA\\v[0-9]+', p, re.I)); os.environ['CUDA_HOME'] = ''; os.environ['CUDA_PATH'] = ''; import appose.python_worker; appose.python_worker.main()"
'''

[feature.win-x86-64-no-cuda.tasks.check-gpu]
cmd = '''
python -c "import os, platform, re; os.environ['PATH'] = ';'.join(p for p in os.environ.get('PATH', '').split(';') if not re.search(r'CUDA\\v[0-9]+', p, re.I)); os.environ['CUDA_HOME'] = ''; os.environ['CUDA_PATH'] = ''; import torch, torchvision; print('Torch:', torch.__version__); print('Torchvision:', torchvision.__version__); print('CUDA available:', torch.cuda.is_available()); print('CUDA runtime:', torch.version.cuda); print('Platform:', platform.platform())"
'''

[environments]
win-x86-64-no-cuda = ["standard-packages", "win-x86-64-no-cuda"]
